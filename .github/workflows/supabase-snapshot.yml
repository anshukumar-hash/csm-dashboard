name: Daily Supabase Snapshot

on:
  schedule:
    # End-of-(IST)-day snapshot. Three windows so GitHub's best-effort scheduler
    # can't skip the day; the write is idempotent on snapshot_date (clears +
    # re-upserts), so extra runs just overwrite — the last one of the day wins.
    # 16:47 / 18:17 / 20:17 UTC = 10:17 PM / 11:47 PM / 1:47 AM IST (all same UTC
    # day, so snapshot_date stays correct even under delay).
    - cron: '47 16 * * *'
    - cron: '17 18 * * *'
    - cron: '17 20 * * *'
  workflow_dispatch: {}

concurrency:
  group: supabase-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies + Chromium
        working-directory: email
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Snapshot dashboard → Supabase
        working-directory: email
        run: node supabase-snapshot.mjs
