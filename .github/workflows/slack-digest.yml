name: Daily CS Report to Slack

on:
  schedule:
    # Target ~9:30 AM IST (after the email). Three windows + "already posted
    # today" gate so late crons still produce exactly one Slack post.
    # 03:50 / 04:30 / 05:30 UTC = 9:20 / 10:00 / 11:00 IST.
    - cron: '50 3 * * *'
    - cron: '30 4 * * *'
    - cron: '30 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: cs-report-slack
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  slack:
    runs-on: ubuntu-latest
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:   ${{ secrets.SLACK_CHANNEL }}
    steps:
      - name: Gate — skip if already posted today (scheduled runs only)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then echo "Manual run — proceeding."; echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          TODAY=$(date -u +%Y-%m-%d)
          CNT=$(gh run list --workflow="slack-digest.yml" --status success --json createdAt -R "$GITHUB_REPOSITORY" -q "[.[] | select(.createdAt | startswith(\"$TODAY\"))] | length" 2>/dev/null || echo 0)
          if [ "${CNT:-0}" -gt 0 ]; then echo "Already posted today ($CNT run(s)); skipping."; echo "skip=true" >> "$GITHUB_OUTPUT";
          else echo "First scheduled run today; proceeding."; echo "skip=false" >> "$GITHUB_OUTPUT"; fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies + Chromium
        if: steps.gate.outputs.skip != 'true'
        working-directory: email
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Screenshot the Email View and post to Slack
        if: steps.gate.outputs.skip != 'true'
        working-directory: email
        run: node shoot-and-slack.mjs
