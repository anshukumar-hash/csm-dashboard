name: Sync dashboard from Google Sheets

# Triggers:
#  - schedule: every 15 minutes (cron is UTC, "best-effort" — GH may delay
#    by 5-15 min on busy queues; that's normal)
#  - workflow_dispatch: manual "Run workflow" button in the Actions tab
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Concurrency: only one sync runs at a time. If a new run is queued while
# one is in flight, cancel the older one — avoids commit-race conflicts.
concurrency:
  group: sync-dashboard
  cancel-in-progress: true

permissions:
  contents: write   # needed so GITHUB_TOKEN can push commits back

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # Job-level so the `if: env.HOOK != ''` gate on the Vercel step can
      # see it — step-level env isn't visible in step-level if conditions.
      HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # fetch-depth=1 is the default; we just need HEAD to commit on top of.

      - name: Fetch all 3 tabs via gviz and update index.html
        shell: pwsh
        env:
          METABASE_SECRET_KEY: ${{ secrets.METABASE_SECRET_KEY }}
        run: ./.github/scripts/sync.ps1

      - name: Commit and push if data changed
        run: |
          # Show what changed (for the workflow log)
          git status --short
          # All three dashboard copies must move together: index.html is the
          # source of truth, CSM_Dashboard.html is the historical email mirror,
          # vercel_deploy/index.html is what Vercel actually serves. sync.ps1
          # writes to all three; this step commits all three.
          if [[ -z "$(git status --porcelain index.html CSM_Dashboard.html vercel_deploy/index.html)" ]]; then
            echo "No changes — sheets data is identical to repo. Skipping commit."
            exit 0
          fi
          # Configure the bot identity
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html CSM_Dashboard.html vercel_deploy/index.html
          ts=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "Auto-sync from Google Sheets ($ts) [skip ci]"
          # Push with rebase-and-retry: the churn sync (sync-churn.yml) writes
          # churn_data.json on its own schedule and can advance main between our
          # commit and push, which used to reject this push (non-fast-forward).
          # The two syncs touch disjoint files, so a rebase is always clean.
          for attempt in 1 2 3 4 5; do
            if git push; then echo "Pushed update to origin/main"; exit 0; fi
            echo "push rejected (attempt $attempt) — rebasing on latest main and retrying"
            git pull --rebase origin main
          done
          echo "Push still failing after retries"; exit 1

      - name: Ping Vercel deploy hook
        if: env.HOOK != ''
        run: |
          # Vercel deploy hook = a URL you generate in:
          #   Vercel dashboard → Project Settings → Git → Deploy Hooks
          # for the project `customer_success_operative_dashboard` under
          # team `hey-s-projects4`. Paste it as the GitHub repo secret
          # VERCEL_DEPLOY_HOOK and this step fires it on every sync that
          # commits new data. Bypasses the GitHub-author permission check
          # that was blocking auto-deploys.
          echo "Triggering Vercel deploy on customer_success_operative_dashboard..."
          resp=$(curl -sS -X POST "$HOOK")
          echo "Vercel response: $resp"
