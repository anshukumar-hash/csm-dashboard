name: Fetch Communication (CSAT) from Metabase

on:
  schedule:
    # Every 2 hours on an odd minute (avoids GitHub's congested :00).
    - cron: '43 */2 * * *'
  workflow_dispatch: {}

concurrency:
  group: metabase-comm
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      METABASE_SECRET_KEY:    ${{ secrets.METABASE_SECRET_KEY }}
      METABASE_EMBED_SECRET:  ${{ secrets.METABASE_EMBED_SECRET }}
      METABASE_URL:           ${{ secrets.METABASE_URL }}
      METABASE_COMM_QUESTION: ${{ secrets.METABASE_COMM_QUESTION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Guard — require the embedding secret
        run: |
          if [ -z "${METABASE_SECRET_KEY}" ] && [ -z "${METABASE_EMBED_SECRET}" ]; then
            echo "::error::Neither METABASE_SECRET_KEY nor METABASE_EMBED_SECRET is set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Fetch question 358 → comm_metabase.json
        working-directory: metabase
        # Tolerate a Metabase failure so a persistently-broken fetch does NOT
        # fail the whole run (which emails a "workflow failed" notification every
        # 2 hours). On failure we emit a ::warning:: (visible in the run, but
        # GitHub does not email for warnings) and keep the last-good
        # comm_metabase.json — the commit step below finds no change, so nothing
        # is committed or deployed. When the embedding secret is fixed the fetch
        # succeeds again and data updates normally, no re-enable needed.
        run: |
          if node fetch-comm.mjs; then
            echo "CSAT fetch OK"
          else
            echo "::warning::CSAT fetch from Metabase (question 358) failed — keeping the last-good comm_metabase.json. Most likely a stale METABASE_SECRET_KEY (embedding secret): rotate it under Settings → Secrets and variables → Actions to restore fresh CSAT."
          fi

      - name: Commit comm_metabase.json + redeploy if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES="comm_metabase.json vercel_deploy/comm_metabase.json"
          if [[ -n "$(git status --porcelain $FILES)" ]]; then
            git add $FILES
            git commit -m "Update comm_metabase.json (CSAT from Metabase 358) [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 5
            done
            # No deploy-hook ping: the git push above already triggers Vercel's
            # Git-integration auto-deploy (avoids a duplicate build vs the 100/day cap).
          else
            echo "comm_metabase.json unchanged — no commit"
          fi
