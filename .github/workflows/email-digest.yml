name: Daily CS Report Screenshot

on:
  schedule:
    # Target ~9:00 AM IST. GitHub's scheduler is best-effort (delays, occasional
    # drops), so fire on THREE windows and gate on "already sent today" — several
    # late crons still produce exactly one email. 03:20 / 04:00 / 05:00 UTC =
    # 8:50 / 9:30 / 10:30 IST.
    - cron: '20 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: cs-report-screenshot
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  shoot:
    runs-on: ubuntu-latest
    env:
      DIGEST_FROM:        ${{ secrets.DIGEST_FROM }}
      DIGEST_RECIPIENTS:  ${{ secrets.DIGEST_RECIPIENTS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
    steps:
      - name: Gate — skip if already sent today (scheduled runs only)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then echo "Manual run — proceeding."; echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          TODAY=$(date -u +%Y-%m-%d)
          CNT=$(gh run list --workflow="email-digest.yml" --status success --json createdAt -R "$GITHUB_REPOSITORY" -q "[.[] | select(.createdAt | startswith(\"$TODAY\"))] | length" 2>/dev/null || echo 0)
          if [ "${CNT:-0}" -gt 0 ]; then echo "Already sent today ($CNT run(s)); skipping."; echo "skip=true" >> "$GITHUB_OUTPUT";
          else echo "First scheduled run today; proceeding."; echo "skip=false" >> "$GITHUB_OUTPUT"; fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies + Chromium
        if: steps.gate.outputs.skip != 'true'
        working-directory: email
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Screenshot the Email View and send
        if: steps.gate.outputs.skip != 'true'
        working-directory: email
        run: node shoot-and-send.mjs
