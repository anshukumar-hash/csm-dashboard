name: Sync churn from Metabase

# Triggers:
#  - schedule: every 30 minutes (cron is UTC, "best-effort" — GH may delay
#    by 5-15 min on busy queues; that's normal). Deploy is gated on actual
#    churn-data change to stay under Vercel's 100/day free cap.
#  - workflow_dispatch: manual "Run workflow" button in the Actions tab
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# Concurrency: only one churn sync runs at a time. If a new run is queued
# while one is in flight, cancel the older one — avoids commit-race conflicts.
concurrency:
  group: sync-churn
  cancel-in-progress: true

permissions:
  contents: write   # needed so GITHUB_TOKEN can push commits back

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # Job-level so the `if: env.HOOK != ''` gate on the Vercel step can
      # see it — step-level env isn't visible in step-level if conditions.
      HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # global fetch() needs Node 18+; pin 20 LTS

      - name: Fetch the Metabase churn cards and write churn_data.json
        run: node ./.github/scripts/sync-churn.mjs

      - name: Commit and push if data changed
        id: commit
        run: |
          # Show what changed (for the workflow log)
          git status --short
          # Both copies must move together: churn_data.json is the source,
          # vercel_deploy/churn_data.json is what Vercel actually serves.
          if [[ -z "$(git status --porcelain churn_data.json vercel_deploy/churn_data.json)" ]]; then
            echo "No changes — churn data is identical to repo. Skipping commit + deploy."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Configure the bot identity
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add churn_data.json vercel_deploy/churn_data.json
          ts=$(date -u +'%Y-%m-%d %H:%M UTC')
          git commit -m "Auto-sync churn from Metabase ($ts) [skip ci]"
          git push
          echo "Pushed update to origin/main"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # Deploy ONLY when churn data actually changed (was firing every 15 min
      # regardless — a major contributor to the free-tier 100-deploys/day cap).
      - name: Ping Vercel deploy hook
        if: env.HOOK != '' && steps.commit.outputs.changed == 'true'
        run: |
          # Vercel deploy hook fires a redeploy so the freshly-committed
          # churn_data.json is served. Same hook the dashboard sync uses.
          echo "Triggering Vercel deploy on customer_success_operative_dashboard..."
          resp=$(curl -sS -X POST "$HOOK")
          echo "Vercel response: $resp"
