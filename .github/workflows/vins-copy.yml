name: Copy vins to CSM Supabase

on:
  schedule:
    # Once a day at 02:17 UTC (= 07:47 AM IST), so the 360 / image-pendency
    # feeds are fresh for the start of the India workday. Was hourly ('17 * * * *')
    # but each run does a full DROP/CREATE/reload of the dest tables — 24 rebuilds/
    # day churned the small CSM Supabase project's CPU. Daily is plenty: the
    # underlying pendency data changes on a daily rhythm, not minute-to-minute.
    # Use "Run workflow" (workflow_dispatch) for an on-demand mid-day refresh.
    - cron: '17 2 * * *'
  workflow_dispatch: {}

concurrency:
  group: vins-copy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    env:
      VINS_SOURCE_DB_URL: ${{ secrets.VINS_SOURCE_DB_URL }}
      CSM_DEST_DB_URL:    ${{ secrets.CSM_DEST_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: supabase
        run: npm install

      - name: Copy vins → CSM Supabase (writes vins360.json)
        working-directory: supabase
        run: node copy-vins.mjs

      - name: Commit vins360.json + redeploy if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES="vins360.json vercel_deploy/vins360.json vins_buckets.json vercel_deploy/vins_buckets.json rooftop_adoption.json vercel_deploy/rooftop_adoption.json vins_360_detail.json vercel_deploy/vins_360_detail.json vins_image_buckets.json vercel_deploy/vins_image_buckets.json vins_image_detail.json vercel_deploy/vins_image_detail.json csm_action_trend.json vercel_deploy/csm_action_trend.json"
          if [[ -n "$(git status --porcelain $FILES)" ]]; then
            git add $FILES
            git commit -m "Update vins360 / vins_buckets / rooftop_adoption data [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 5
            done
            # No deploy-hook ping: the git push above already triggers Vercel's
            # Git-integration auto-deploy. Pinging the hook too double-deployed
            # (redundant build, counted against the 100/day cap). Refresh unchanged.
          else
            echo "vins360.json unchanged — no commit"
          fi
