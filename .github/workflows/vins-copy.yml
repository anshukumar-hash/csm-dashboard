name: Copy vins to CSM Supabase

on:
  schedule:
    # Every 4 hours on an odd minute (avoids GitHub's congested :00).
    - cron: '17 */4 * * *'
  workflow_dispatch: {}

concurrency:
  group: vins-copy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    env:
      VINS_SOURCE_DB_URL: ${{ secrets.VINS_SOURCE_DB_URL }}
      CSM_DEST_DB_URL:    ${{ secrets.CSM_DEST_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: supabase
        run: npm install

      - name: Copy vins → CSM Supabase (writes vins360.json)
        working-directory: supabase
        run: node copy-vins.mjs

      - name: Commit vins360.json + redeploy if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES="vins360.json vercel_deploy/vins360.json vins_buckets.json vercel_deploy/vins_buckets.json rooftop_adoption.json vercel_deploy/rooftop_adoption.json vins_360_detail.json vercel_deploy/vins_360_detail.json csm_action_trend.json vercel_deploy/csm_action_trend.json"
          if [[ -n "$(git status --porcelain $FILES)" ]]; then
            git add $FILES
            git commit -m "Update vins360 / vins_buckets / rooftop_adoption data [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break || sleep 5
            done
            if [[ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]]; then curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" >/dev/null && echo "deploy hook pinged"; fi
          else
            echo "vins360.json unchanged — no commit"
          fi
