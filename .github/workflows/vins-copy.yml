name: Copy vins to CSM Supabase

on:
  schedule:
    # Every 6 hours on an odd minute (avoids GitHub's congested :00).
    - cron: '17 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: vins-copy
  cancel-in-progress: false

jobs:
  copy:
    runs-on: ubuntu-latest
    env:
      VINS_SOURCE_DB_URL: ${{ secrets.VINS_SOURCE_DB_URL }}
      CSM_DEST_DB_URL:    ${{ secrets.CSM_DEST_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: supabase
        run: npm install

      - name: Copy vins → CSM Supabase
        working-directory: supabase
        run: node copy-vins.mjs
